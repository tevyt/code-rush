spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

code-rush:
  secret: test-secret
  keys-dir: ${java.io.tmpdir}/code-rush-test/keys
  build-timeout: 30m
  step-timeout: 15m
